<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediScan - Vue iPhone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Calibri', system-ui, sans-serif;
            background: #1a1a1a;
            color: #F0F4F8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        .iphone-container {
            position: relative;
            width: 375px;
            height: 812px;
            background: #000;
            border-radius: 50px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            overflow: hidden;
            border: 12px solid #000;
        }
        .iphone-notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 28px;
            background: #000;
            border-radius: 0 0 30px 30px;
            z-index: 100;
        }
        .iphone-screen {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0A1628 0%, #1A2E4A 100%);
            overflow-y: auto;
            padding-top: 44px;
            scroll-behavior: smooth;
        }
        .iphone-screen::-webkit-scrollbar {
            width: 4px;
        }
        .iphone-screen::-webkit-scrollbar-track {
            background: transparent;
        }
        .iphone-screen::-webkit-scrollbar-thumb {
            background: #0D9488;
            border-radius: 2px;
        }
        .status-bar {
            position: fixed;
            top: 8px;
            left: 0;
            right: 0;
            height: 28px;
            background: transparent;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            z-index: 200;
            color: #FFF;
            font-size: 12px;
            font-weight: 600;
        }
        .status-left {
            display: flex;
            gap: 4px;
        }
        .status-right {
            display: flex;
            gap: 4px;
            align-items: center;
        }
        .card {
            background: #1A2E4A;
            border-radius: 1.2rem;
            margin: 1rem;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
            border: 1px solid #0D9488;
            overflow: hidden;
        }
        .card-header {
            background: linear-gradient(135deg, #0D9488 0%, #14B8A6 100%);
            padding: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .card-header h1 {
            font-size: 1.4rem;
            color: #0A1628;
            font-weight: 700;
            margin: 0;
        }
        .card-header span {
            font-size: 1.6rem;
        }
        .card-body {
            padding: 1.5rem;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        label {
            display: block;
            color: #14B8A6;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }
        textarea, input[type="text"], input[type="password"], select {
            width: 100%;
            padding: 0.8rem;
            background: #0A1628;
            border: 2px solid #1E3A5F;
            border-radius: 0.6rem;
            color: #F0F4F8;
            font-family: 'Calibri', sans-serif;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        textarea:focus, input:focus, select:focus {
            outline: none;
            border-color: #0D9488;
            box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.2);
        }
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-top: 0.8rem;
        }
        .suggestion-btn {
            background: #1E3A5F;
            color: #14B8A6;
            padding: 0.4rem 0.8rem;
            border-radius: 1.5rem;
            border: 1px solid #0D9488;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .suggestion-btn:active {
            background: #0D9488;
            color: #0A1628;
        }
        .btn {
            width: 100%;
            background: #0D9488;
            color: #0A1628;
            font-weight: 700;
            padding: 0.9rem;
            border-radius: 2.5rem;
            border: none;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(13, 148, 136, 0.3);
            margin-bottom: 0.8rem;
        }
        .btn:active {
            transform: scale(0.97);
        }
        .btn-secondary {
            background: #1E3A5F;
            color: #CCFBF1;
            box-shadow: none;
            border: 1px solid #0D9488;
        }
        .btn-secondary:active {
            background: #2A4A72;
        }
        .results-container {
            min-height: 150px;
        }
        .result-item {
            background: #0A1628;
            padding: 1rem;
            border-radius: 0.6rem;
            margin-bottom: 0.8rem;
            border-left: 4px solid #0D9488;
        }
        .disease-name {
            color: #14B8A6;
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 0.5rem;
        }
        .risk-level {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 0.6rem;
        }
        .risk-percentage {
            font-size: 1rem;
            font-weight: 700;
            color: #F97316;
            min-width: 35px;
        }
        .risk-bar {
            flex: 1;
            height: 6px;
            background: #1E3A5F;
            border-radius: 3px;
            overflow: hidden;
        }
        .risk-fill {
            height: 100%;
            background: linear-gradient(90deg, #22C55E, #F97316, #EF4444);
        }
        .disease-description {
            color: #E2E8F0;
            font-size: 0.8rem;
            margin-top: 0.6rem;
            line-height: 1.4;
        }
        .loading {
            text-align: center;
            padding: 1.5rem;
            color: #14B8A6;
        }
        .spinner {
            display: inline-block;
            width: 1.2rem;
            height: 1.2rem;
            border: 3px solid #1E3A5F;
            border-top-color: #14B8A6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 0.6rem;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .empty-state {
            text-align: center;
            color: #475569;
            padding: 1.5rem;
        }
        .warning {
            background: #1E3A5F;
            border-left: 3px solid #F97316;
            padding: 0.8rem;
            border-radius: 0.5rem;
            margin-top: 1rem;
            color: #F97316;
            font-size: 0.8rem;
            line-height: 1.4;
        }
        .error, .success {
            padding: 0.8rem;
            border-radius: 0.5rem;
            margin-bottom: 0.8rem;
            font-size: 0.85rem;
        }
        .error {
            background: #1E3A5F;
            border-left: 3px solid #EF4444;
            color: #F87171;
        }
        .success {
            background: #1E3A5F;
            border-left: 3px solid #22C55E;
            color: #86EFAC;
        }
        .bottom-padding {
            height: 2rem;
        }
        .screen-mockup {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 50;
        }
        .home-indicator {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 4px;
            background: #000;
            border-radius: 2px;
            z-index: 150;
        }
    </style>
</head>
<body>

    <div class="iphone-container">
        <div class="status-bar">
            <div class="status-left">
                <span>📡</span>
                <span>📶</span>
            </div>
            <div style="font-weight: bold;">9:41</div>
            <div class="status-right">
                <span>🔋</span>
            </div>
        </div>
        <div class="iphone-notch"></div>
        
        <div class="iphone-screen" id="screen">
            <!-- FORM CARD -->
            <div class="card">
                <div class="card-header">
                    <span>🏥</span>
                    <h1>MediScan</h1>
                </div>
                <div class="card-body">
                    <h2 style="color: #CCFBF1; margin-bottom: 1.2rem; font-size: 1.2rem;">Diagnostic IA</h2>

                    <div class="form-group">
                        <label>🔑 Clé API Gemini</label>
                        <input type="password" id="apiKey" placeholder="AIzaSy...">
                    </div>

                    <div class="form-group">
                        <label>📋 Symptômes</label>
                        <textarea id="symptoms" placeholder="Décrivez vos symptômes..."></textarea>
                        <div class="suggestions" id="suggestionsList"></div>
                    </div>

                    <div class="form-group">
                        <label>⏱️ Durée</label>
                        <select id="duration">
                            <option value="">-- Sélectionner --</option>
                            <option value="Moins de 24h">Moins de 24h</option>
                            <option value="1-3 jours">1-3 jours</option>
                            <option value="4-7 jours">4-7 jours</option>
                            <option value="Plus d'une semaine">Plus d'une semaine</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>⚠️ Sévérité</label>
                        <select id="severity">
                            <option value="">-- Sélectionner --</option>
                            <option value="Légère">Légère</option>
                            <option value="Modérée">Modérée</option>
                            <option value="Sévère">Sévère</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>📝 Antécédents</label>
                        <textarea id="history" placeholder="Allergies, maladies..."></textarea>
                    </div>

                    <button class="btn" onclick="analyzeWithGemini()">🔍 Analyser</button>
                    <button class="btn btn-secondary" onclick="clearForm()">🗑️ Réinitialiser</button>

                    <div class="warning">
                        ⚠️ Informationnel uniquement. Consultez un professionnel.
                    </div>
                </div>
            </div>

            <!-- RESULTS CARD -->
            <div class="card">
                <div class="card-header">
                    <span>🔬</span>
                    <h1>Résultats</h1>
                </div>
                <div class="card-body">
                    <div class="results-container" id="resultsContainer">
                        <div class="empty-state">
                            👈 Cliquez sur "Analyser"
                        </div>
                    </div>
                </div>
            </div>

            <div class="bottom-padding"></div>
        </div>

        <div class="home-indicator"></div>
    </div>

    <script>
        const symptomSuggestions = [
            "mal de tête", "fièvre", "toux", "fatigue", 
            "nausée", "vertiges", "douleur musculaire",
            "écoulement nasal", "mal de gorge"
        ];

        function initializeSuggestions() {
            const container = document.getElementById('suggestionsList');
            container.innerHTML = symptomSuggestions.map(symptom => 
                `<button class="suggestion-btn" type="button" onclick="addSymptom('${symptom}')">${symptom}</button>`
            ).join('');
        }

        function addSymptom(symptom) {
            const textarea = document.getElementById('symptoms');
            if (!textarea.value.includes(symptom)) {
                textarea.value = textarea.value.trim() ? textarea.value + ', ' + symptom : symptom;
            }
        }

        function clearForm() {
            document.getElementById('symptoms').value = '';
            document.getElementById('duration').value = '';
            document.getElementById('severity').value = '';
            document.getElementById('history').value = '';
            document.getElementById('resultsContainer').innerHTML = `<div class="empty-state">👈 Cliquez sur "Analyser"</div>`;
        }

        function normalizeText(text) {
            return String(text || '')
                .toLowerCase()
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .trim();
        }

        const localDiseaseLibrary = [
            {
                name: 'Rhume',
                symptoms: ['toux', 'fatigue', 'mal de gorge', 'ecoulement nasal', 'mal de tete'],
                description: 'Infection virale benigne des voies respiratoires superieures.'
            },
            {
                name: 'Grippe',
                symptoms: ['fievre', 'fatigue', 'toux', 'mal de tete', 'douleur musculaire', 'mal de gorge'],
                description: 'Infection virale saisonniere avec symptomes generaux marques.'
            },
            {
                name: 'Migraine',
                symptoms: ['mal de tete', 'nausee', 'vertiges', 'sensibilite a la lumiere'],
                description: 'Cephalee intense pouvant etre accompagnee de nausees et de sensibilite.'
            },
            {
                name: 'Gastro-enterite',
                symptoms: ['nausee', 'diarrhee', 'fatigue', 'fievre', 'douleur abdominale'],
                description: 'Infection digestive provoquant troubles digestifs et fatigue.'
            },
            {
                name: 'Sinusite',
                symptoms: ['mal de tete', 'ecoulement nasal', 'mal de gorge', 'pression faciale'],
                description: 'Inflammation des sinus avec pression faciale et congestion.'
            },
            {
                name: 'Allergie',
                symptoms: ['ecoulement nasal', 'eruption cutanee', 'demangeaisons', 'mal de tete'],
                description: 'Reaction allergique pouvant provoquer des symptomes respiratoires ou cutanes.'
            }
        ];

        function buildLocalResults(symptomsText) {
            const userSymptoms = normalizeText(symptomsText)
                .split(',')
                .map((symptom) => symptom.trim())
                .filter(Boolean);

            return localDiseaseLibrary
                .map((disease) => {
                    const matchedSymptoms = disease.symptoms.filter((symptom) =>
                        userSymptoms.some((userSymptom) =>
                            userSymptom.includes(normalizeText(symptom)) || normalizeText(symptom).includes(userSymptom)
                        )
                    );

                    const coverage = matchedSymptoms.length / Math.max(disease.symptoms.length, userSymptoms.length || 1);
                    const riskPercentage = Math.max(10, Math.min(95, Math.round(coverage * 100)));

                    return {
                        name: disease.name,
                        riskPercentage,
                        description: disease.description,
                        matchedSymptoms
                    };
                })
                .filter((disease) => disease.riskPercentage >= 20)
                .sort((a, b) => b.riskPercentage - a.riskPercentage)
                .slice(0, 5);
        }

        async function analyzeWithGemini() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const symptoms = document.getElementById('symptoms').value.trim();
            const duration = document.getElementById('duration').value;
            const severity = document.getElementById('severity').value;
            const history = document.getElementById('history').value.trim();

            if (!apiKey) {
                showError('❌ Entrez votre clé API');
                return;
            }
            if (!symptoms) {
                showError('❌ Décrivez vos symptômes');
                return;
            }

            const resultsContainer = document.getElementById('resultsContainer');
            resultsContainer.innerHTML = '<div class="loading"><span class="spinner"></span>Analyse...</div>';

            try {
                const prompt = `Tu es un assistant médical expert. Analyse ces symptômes et retourne UNIQUEMENT un JSON valide:

SYMPTÔMES: ${symptoms}
DURÉE: ${duration || 'Non spécifiée'}
SÉVÉRITÉ: ${severity || 'Non spécifiée'}
ANTÉCÉDENTS: ${history || 'Aucun'}

Format JSON strict:
{
  "diseases": [
    {
      "name": "Nom",
      "riskPercentage": 85,
      "description": "Description",
      "matchedSymptoms": ["symptôme1"]
    }
  ]
}`;

                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        apiKey,
                        symptoms,
                        duration,
                        severity,
                        history
                    })
                });

                const contentType = response.headers.get('content-type') || '';
                const payload = contentType.includes('application/json')
                    ? await response.json()
                    : { error: await response.text() };

                if (!response.ok) {
                    throw new Error(payload.error || 'Erreur API');
                }

                const data = payload;
                displayResults(data.data?.diseases || [], data.fallbackUsed, data.fallbackMessage);

            } catch (error) {
                const fallbackData = buildLocalResults(symptoms);
                displayResults(
                    fallbackData,
                    true,
                    `Impossible de joindre le backend local (${error.message || 'erreur inconnue'}). Resultats generes localement.`
                );
            }
        }

        function displayResults(diseases, fallbackUsed = false, fallbackMessage = '') {
            const resultsContainer = document.getElementById('resultsContainer');
            
            if (!diseases || diseases.length === 0) {
                resultsContainer.innerHTML = '<div class="empty-state">❌ Aucun résultat</div>';
                return;
            }

            diseases.sort((a, b) => (b.riskPercentage || 0) - (a.riskPercentage || 0));

            const html = diseases.map(disease => {
                const risk = disease.riskPercentage || 0;
                const icon = risk > 70 ? '🔴' : risk > 50 ? '🟠' : '🟢';
                return `
                    <div class="result-item">
                        <div class="disease-name">${icon} ${disease.name}</div>
                        <div class="risk-level">
                            <span class="risk-percentage">${risk}%</span>
                            <div class="risk-bar">
                                <div class="risk-fill" style="width: ${risk}%"></div>
                            </div>
                        </div>
                        <div class="disease-description">${disease.description}</div>
                    </div>
                `;
            }).join('');

            const notice = fallbackUsed
                ? `<div class="warning">⚠️ ${fallbackMessage || 'Résultats générés localement car le quota de l\'API est atteint.'}</div>`
                : '<div class="success">✅ Analyse terminée</div>';

            resultsContainer.innerHTML = `${notice}${html}`;
        }

        function showError(message) {
            document.getElementById('resultsContainer').innerHTML = `<div class="error">${message}</div>`;
        }

        document.addEventListener('DOMContentLoaded', initializeSuggestions);
    </script>

</body>
</html>
